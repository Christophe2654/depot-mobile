<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dépôt" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Dépôt</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --card: #0f3460;
      --accent: #e94560;
      --accent2: #533483;
      --text: #eaeaea;
      --text-dim: #8892a4;
      --border: #2a3a5c;
      --radius: 14px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-top: var(--safe-top);
      padding-bottom: calc(var(--safe-bottom) + 80px);
      overflow-x: hidden;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(26,26,46,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    .count-badge {
      background: var(--accent);
      color: white;
      font-size: 12px;
      font-weight: 700;
      border-radius: 20px;
      padding: 3px 9px;
      min-width: 28px;
      text-align: center;
    }

    nav {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      z-index: 20;
      background: rgba(22,33,62,0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-bottom);
    }
    nav button {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-dim);
      padding: 10px 0 8px;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }
    nav button.active { color: var(--accent); }
    nav button svg { width: 22px; height: 22px; }

    .view { display: none; padding: 16px 16px 0; }
    .view.active { display: block; }

    .pills {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 12px;
      -webkit-overflow-scrolling: touch;
    }
    .pills::-webkit-scrollbar { display: none; }
    .pill {
      flex-shrink: 0;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text-dim);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .notes-list { display: flex; flex-direction: column; gap: 12px; }
    .note-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      position: relative;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .note-card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .cat-tag {
      font-size: 11px;
      font-weight: 600;
      border-radius: 6px;
      padding: 2px 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .cat-idee    { background: #2d1b69; color: #a78bfa; }
    .cat-tip     { background: #14532d; color: #4ade80; }
    .cat-projet  { background: #1e3a5f; color: #60a5fa; }
    .cat-whatsapp{ background: #14402d; color: #34d399; }
    .cat-autre   { background: #3b2600; color: #fbbf24; }
    .note-date { font-size: 11px; color: var(--text-dim); margin-left: auto; }
    .note-text { font-size: 15px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .note-audio { margin-top: 8px; }
    .note-audio audio { width: 100%; height: 36px; border-radius: 8px; }

    .note-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      justify-content: flex-end;
    }
    .btn-icon {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-icon:hover, .btn-icon:active { border-color: var(--accent); color: var(--accent); }
    .btn-delete { border-color: #3d1a1a; color: #ef4444; }
    .btn-delete:hover, .btn-delete:active { background: #3d1a1a; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    .compose-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }
    .compose-card h2 { font-size: 16px; font-weight: 600; margin-bottom: 14px; }

    .input-group { margin-bottom: 14px; }
    label { font-size: 13px; color: var(--text-dim); display: block; margin-bottom: 6px; }

    select, textarea {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      padding: 10px 12px;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      transition: border-color 0.2s;
    }
    select:focus, textarea:focus { border-color: var(--accent); }
    textarea { min-height: 120px; resize: none; line-height: 1.5; }

    .mode-tabs {
      display: flex;
      background: var(--bg);
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
    }
    .mode-tab {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-dim);
      padding: 8px;
      font-size: 13px;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
      font-family: inherit;
    }
    .mode-tab.active {
      background: var(--accent);
      color: white;
      font-weight: 600;
    }

    .mode-panel { display: none; }
    .mode-panel.active { display: block; }

    .recorder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 20px 0 10px;
    }
    .rec-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      box-shadow: 0 0 0 0 rgba(233,69,96,0.4);
    }
    .rec-btn.recording {
      background: #ef4444;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
      70% { box-shadow: 0 0 0 16px rgba(239,68,68,0); }
      100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
    }
    .rec-status { font-size: 14px; color: var(--text-dim); }
    .rec-timer { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text); }
    .rec-preview { width: 100%; }
    .rec-preview audio { width: 100%; border-radius: 8px; height: 36px; }
    .rec-transcript {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text-dim);
      font-style: italic;
      min-height: 50px;
      line-height: 1.5;
    }

    .btn-submit {
      width: 100%;
      background: var(--accent);
      border: none;
      color: white;
      font-size: 17px;
      font-weight: 700;
      padding: 16px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.2s;
      font-family: inherit;
    }
    .btn-submit:active { opacity: 0.8; }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    .toast {
      position: fixed;
      bottom: calc(var(--safe-bottom) + 90px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #22c55e;
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .search-wrap { margin-bottom: 14px; position: relative; }
    .search-wrap svg {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      color: var(--text-dim);
    }
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      padding: 10px 12px 10px 38px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .search-input:focus { border-color: var(--accent); }
  </style>
</head>
<body>

<header>
  <h1>Dé<span>pôt</span></h1>
  <span class="count-badge" id="total-count">0</span>
</header>

<div class="view active" id="view-list">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input class="search-input" type="search" id="search-input" placeholder="Rechercher…" />
  </div>
  <div class="pills" id="filter-pills">
    <div class="pill active" data-cat="all">Tout</div>
    <div class="pill" data-cat="idee">Idée</div>
    <div class="pill" data-cat="tip">Tip</div>
    <div class="pill" data-cat="projet">Projet</div>
    <div class="pill" data-cat="whatsapp">WhatsApp</div>
    <div class="pill" data-cat="autre">Autre</div>
  </div>
  <div class="notes-list" id="notes-list"></div>
</div>

<div class="view" id="view-compose">
  <div class="compose-card">
    <h2>Nouveau dépôt</h2>

    <div class="input-group">
      <label>Catégorie</label>
      <select id="cat-select">
        <option value="idee">💡 Idée</option>
        <option value="tip">✅ Tip</option>
        <option value="projet">🎯 Projet</option>
        <option value="whatsapp">💬 WhatsApp</option>
        <option value="autre">📌 Autre</option>
      </select>
    </div>

    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="texte">✍️ Texte</button>
      <button class="mode-tab" data-mode="coller">📋 Coller</button>
      <button class="mode-tab" data-mode="vocal">🎙️ Vocal</button>
    </div>

    <div class="mode-panel active" id="panel-texte">
      <div class="input-group">
        <label>Votre note</label>
        <textarea id="text-input" placeholder="Écrivez ici…"></textarea>
      </div>
    </div>

    <div class="mode-panel" id="panel-coller">
      <div class="input-group">
        <label>Collez votre texte (depuis WhatsApp, etc.)</label>
        <textarea id="paste-input" placeholder="Collez ici avec appui long → Coller…"></textarea>
      </div>
      <div class="input-group">
        <label>Source (optionnel)</label>
        <textarea id="source-input" placeholder="Ex : WhatsApp groupe IA, Fil Twitter…" style="min-height:50px"></textarea>
      </div>
    </div>

    <div class="mode-panel" id="panel-vocal">
      <div class="recorder">
        <div class="rec-timer" id="rec-timer">0:00</div>
        <button class="rec-btn" id="rec-btn">🎙️</button>
        <div class="rec-status" id="rec-status">Appuyez pour enregistrer</div>
        <div class="rec-preview" id="rec-preview" style="display:none">
          <audio id="rec-audio" controls></audio>
        </div>
        <div class="rec-transcript" id="rec-transcript" style="display:none"></div>
      </div>
      <div class="input-group" style="margin-top:8px">
        <label>Ajouter une note écrite (optionnel)</label>
        <textarea id="vocal-note" placeholder="Contexte, mots-clés…" style="min-height:60px"></textarea>
      </div>
    </div>
  </div>

  <button class="btn-submit" id="btn-submit">Déposer</button>
</div>

<div class="toast" id="toast">Déposé ✓</div>

<nav>
  <button class="active" data-view="list" id="nav-list">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
      <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
      <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
    </svg>
    Mes notes
  </button>
  <button data-view="compose" id="nav-compose">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
    </svg>
    Déposer
  </button>
</nav>

<script>
  const STORAGE_KEY = 'depot_notes_v1';

  function loadNotes() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch { return []; }
  }

  function saveNotes(notes) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    updateCount(notes.length);
  }

  function updateCount(n) {
    document.getElementById('total-count').textContent = n;
  }

  let currentView = 'list';
  document.querySelectorAll('nav button').forEach(btn => {
    btn.addEventListener('click', () => {
      const view = btn.dataset.view;
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + view).classList.add('active');
      currentView = view;
      if (view === 'list') renderNotes();
    });
  });

  let currentMode = 'texte';
  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      currentMode = tab.dataset.mode;
      document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + currentMode).classList.add('active');
    });
  });

  let currentFilter = 'all';
  let searchQuery = '';
  document.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', () => {
      currentFilter = pill.dataset.cat;
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      renderNotes();
    });
  });

  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase();
    renderNotes();
  });

  function catLabel(cat) {
    const map = { idee: 'Idée', tip: 'Tip', projet: 'Projet', whatsapp: 'WhatsApp', autre: 'Autre' };
    return map[cat] || cat;
  }

  function formatDate(iso) {
    const d = new Date(iso);
    const today = new Date();
    const diff = Math.floor((today - d) / 86400000);
    if (diff === 0) return "Aujourd'hui " + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    if (diff === 1) return 'Hier ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
  }

  function renderNotes() {
    const notes = loadNotes();
    let filtered = notes;
    if (currentFilter !== 'all') filtered = filtered.filter(n => n.cat === currentFilter);
    if (searchQuery) filtered = filtered.filter(n =>
      (n.text || '').toLowerCase().includes(searchQuery) ||
      (n.source || '').toLowerCase().includes(searchQuery) ||
      (n.vocalNote || '').toLowerCase().includes(searchQuery) ||
      (n.transcript || '').toLowerCase().includes(searchQuery)
    );
    filtered = [...filtered].reverse();

    const list = document.getElementById('notes-list');
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>' + (notes.length === 0 ? 'Rien encore — appuyez sur + pour déposer' : 'Aucun résultat') + '</p></div>';
      return;
    }

    list.innerHTML = filtered.map(n => {
      return '<div class="note-card">' +
        '<div class="note-card-top">' +
          '<span class="cat-tag cat-' + n.cat + '">' + catLabel(n.cat) + '</span>' +
          '<span class="note-date">' + formatDate(n.date) + '</span>' +
        '</div>' +
        (n.text ? '<div class="note-text">' + escHtml(n.text) + '</div>' : '') +
        (n.source ? '<div style="margin-top:6px;font-size:12px;color:var(--text-dim)">📎 ' + escHtml(n.source) + '</div>' : '') +
        (n.audioUrl ? '<div class="note-audio"><audio controls src="' + n.audioUrl + '"></audio></div>' : '') +
        (n.transcript ? '<div style="margin-top:6px;font-size:13px;color:var(--text-dim);font-style:italic">🗒️ ' + escHtml(n.transcript) + '</div>' : '') +
        (n.vocalNote ? '<div style="margin-top:6px;font-size:14px">' + escHtml(n.vocalNote) + '</div>' : '') +
        '<div class="note-actions">' +
          '<button class="btn-icon btn-delete" onclick="deleteNote(' + notes.indexOf(n) + ')">Supprimer</button>' +
        '</div>' +
      '</div>';
    }).join('');
    updateCount(notes.length);
  }

  function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function deleteNote(index) {
    if (!confirm('Supprimer cette note ?')) return;
    const notes = loadNotes();
    notes.splice(index, 1);
    saveNotes(notes);
    renderNotes();
  }

  let mediaRecorder = null;
  let audioChunks = [];
  let recInterval = null;
  let recSeconds = 0;
  let audioBlob = null;
  let recognition = null;
  let liveTranscript = '';

  const recBtn = document.getElementById('rec-btn');
  const recTimer = document.getElementById('rec-timer');
  const recStatus = document.getElementById('rec-status');
  const recPreview = document.getElementById('rec-preview');
  const recAudio = document.getElementById('rec-audio');
  const recTranscript = document.getElementById('rec-transcript');

  function formatTime(s) {
    return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  }

  recBtn.addEventListener('click', async () => {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
      clearInterval(recInterval);
      recBtn.textContent = '🎙️';
      recBtn.classList.remove('recording');
      recStatus.textContent = 'Enregistrement terminé';
      if (recognition) recognition.stop();
    } else {
      audioBlob = null;
      audioChunks = [];
      liveTranscript = '';
      recTranscript.style.display = 'none';
      recPreview.style.display = 'none';
      recSeconds = 0;
      recTimer.textContent = '0:00';

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          const url = URL.createObjectURL(audioBlob);
          recAudio.src = url;
          recPreview.style.display = 'block';
          stream.getTracks().forEach(t => t.stop());
        };
        mediaRecorder.start();
        recBtn.textContent = '⏹️';
        recBtn.classList.add('recording');
        recStatus.textContent = 'Enregistrement en cours…';
        recInterval = setInterval(() => {
          recSeconds++;
          recTimer.textContent = formatTime(recSeconds);
        }, 1000);

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
          const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
          recognition = new SR();
          recognition.lang = 'fr-FR';
          recognition.continuous = true;
          recognition.interimResults = true;
          recognition.onresult = e => {
            let text = '';
            for (let i = 0; i < e.results.length; i++) {
              text += e.results[i][0].transcript + ' ';
            }
            liveTranscript = text.trim();
            recTranscript.textContent = liveTranscript;
            recTranscript.style.display = 'block';
          };
          recognition.onerror = () => {};
          recognition.start();
        }
      } catch (err) {
        recStatus.textContent = 'Microphone non disponible (' + err.message + ')';
      }
    }
  });

  document.getElementById('btn-submit').addEventListener('click', () => {
    const cat = document.getElementById('cat-select').value;
    const notes = loadNotes();
    let note = { cat, date: new Date().toISOString() };
    let valid = false;

    if (currentMode === 'texte') {
      const t = document.getElementById('text-input').value.trim();
      if (!t) { alert('Écrivez quelque chose d\'abord.'); return; }
      note.text = t;
      valid = true;
    } else if (currentMode === 'coller') {
      const t = document.getElementById('paste-input').value.trim();
      if (!t) { alert('Collez du texte d\'abord.'); return; }
      note.text = t;
      const src = document.getElementById('source-input').value.trim();
      if (src) note.source = src;
      valid = true;
    } else if (currentMode === 'vocal') {
      if (!audioBlob && !document.getElementById('vocal-note').value.trim()) {
        alert('Enregistrez un mémo vocal ou écrivez une note.'); return;
      }
      if (audioBlob) {
        const reader = new FileReader();
        reader.onload = () => {
          note.audioUrl = reader.result;
          if (liveTranscript) note.transcript = liveTranscript;
          const vn = document.getElementById('vocal-note').value.trim();
          if (vn) note.vocalNote = vn;
          notes.push(note);
          saveNotes(notes);
          resetCompose();
          showToast();
        };
        reader.readAsDataURL(audioBlob);
        return;
      } else {
        note.vocalNote = document.getElementById('vocal-note').value.trim();
        valid = true;
      }
    }

    if (valid) {
      notes.push(note);
      saveNotes(notes);
      resetCompose();
      showToast();
    }
  });

  function resetCompose() {
    document.getElementById('text-input').value = '';
    document.getElementById('paste-input').value = '';
    document.getElementById('source-input').value = '';
    document.getElementById('vocal-note').value = '';
    audioBlob = null;
    liveTranscript = '';
    recPreview.style.display = 'none';
    recTranscript.style.display = 'none';
    recTimer.textContent = '0:00';
    recStatus.textContent = 'Appuyez pour enregistrer';
    recBtn.textContent = '🎙️';
    recBtn.classList.remove('recording');
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('nav-list').classList.add('active');
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-list').classList.add('active');
    renderNotes();
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  renderNotes();
</script>
</body>
</html>
